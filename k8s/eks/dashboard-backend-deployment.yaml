apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: kubevigil
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      serviceAccountName: kubevigil-ai-agent
      containers:
      - name: dashboard-backend
        image: 164686058235.dkr.ecr.ap-south-1.amazonaws.com/kubevigil/dashboard-backend:v5
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
        env:
        - name: PG_HOST
          value: "kubevigil-db.cl44qcoa0l6m.ap-south-1.rds.amazonaws.com"
        - name: PG_DATABASE
          value: "kubevigil"
        - name: PG_USER
          value: "postgres"
        - name: PG_PASSWORD
          value: "kubevigil123"
        - name: PORT
          value: "4000"
        - name: KAFKA_BROKER
          value: "kafka.kubevigil.svc.cluster.local:9092"
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
  namespace: kubevigil
spec:
  selector:
    app: dashboard-backend
  ports:
  - port: 4000
    targetPort: 4000
  type: LoadBalancer