name: Watcher CI/CD

on:
  push:
    paths:
      - 'backend/kubevigil/watcher/**'  # only runs when watcher code changes
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: kubevigil/watcher

jobs:
  build-and-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest

    steps:
    # Step 1 — checkout the code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2 — login to AWS
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # Step 3 — login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # Step 4 — build docker image and push to ECR
    - name: Build, tag and push image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}  # use git commit hash as image tag — fully traceable
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          ./backend/kubevigil/watcher
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # Step 5 — update the k8s manifest with the new image tag
    # ArgoCD watches this file in Git — when it changes, ArgoCD redeploys automatically
    - name: Update k8s manifest with new image tag
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        sed -i "s|image: .*kubevigil/watcher.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
          k8s/watcher-deployment.yaml
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add k8s/watcher-deployment.yaml
        git commit -m "ci: update watcher image to $IMAGE_TAG"
        git push