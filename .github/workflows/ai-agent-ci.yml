name: AI Agent CI/CD

on:
  push:
    paths:
      - 'backend/kubevigil/ai-agent/**'
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: kubevigil/ai-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag and push image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          ./backend/kubevigil/ai-agent
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Update k8s manifest
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        sed -i "s|image: .*kubevigil/ai-agent.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
          k8s/eks/ai-agent-deployment.yaml
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add k8s/eks/ai-agent-deployment.yaml
        git commit -m "ci: update ai-agent image to $IMAGE_TAG"
        git push